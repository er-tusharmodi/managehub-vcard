services:
  # 1. Main Website (managehub.in) - No Database
  main-app:
    image: ertusharmodi/managehub:latest
    container_name: managehub-main-app
    restart: unless-stopped
    expose:
      - "80"
    env_file:
      - .env.main
    networks:
      - managehub-network

  # 2. VCard App (vcard.managehub.in) - With MongoDB
  app:
    image: ertusharmodi/managehub-vcard:latest
    container_name: managehub-vcard-app
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/usr/local/bin/docker-entrypoint.sh"]
    expose:
      - "80"
    env_file:
      - .env.vcard
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mongodb
      DB_HOST: mongodb
      DB_PORT: 27017
      MONGODB_URI: mongodb://mongodb:27017/vcard_db
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage
    networks:
      - managehub-network

  # 3. Nginx Proxy (Dono domains ko handle karega)
  nginx:
    image: nginx:latest
    container_name: managehub-nginx-proxy
    restart: unless-stopped
    depends_on:
      - main-app
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - app_storage:/var/www/html/storage:ro
    networks:
      - managehub-network

  # 4. MongoDB (Sirf VCard App ke liye)
  mongodb:
    image: mongo:7
    container_name: managehub-vcard-mongodb
    restart: unless-stopped
    command: ["--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - managehub-network

networks:
  managehub-network:
    driver: bridge

volumes:
  mongo_data:
  app_storage:
