# 1. HTTP to HTTPS Redirect (Sabhi domains ke liye)
server {
    listen 80;
    server_name managehub.in www.managehub.in *.managehub.in;
    return 301 https://$host$request_uri;
}

# 2. Main Website (Sirf managehub.in aur www ke liye)
server {
    listen 443 ssl;
    server_name managehub.in www.managehub.in;

    ssl_certificate /etc/letsencrypt/live/managehub.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/managehub.in/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://main-app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header HTTPS "on"; 

        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# 3. VCard System & Wildcard Catch-all (*.managehub.in)
server {
    listen 443 ssl;
    
    # ✅ Yahan wildcard add kar diya hai
    server_name vcard.managehub.in *.managehub.in;

    ssl_certificate /etc/letsencrypt/live/managehub.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/managehub.in/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100M;

    # Storage Fix: VCard ke images ke liye
    location /storage/ {
        alias /var/www/html/storage/app/public/;
        try_files $uri $uri/ =404;
    }

    location / {
        proxy_pass http://app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443;
        
        # ✅ CSS/Mixed Content Fix
        proxy_set_header HTTPS "on"; 

        proxy_redirect off;
        proxy_read_timeout 600;
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
    }
}